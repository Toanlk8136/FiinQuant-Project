<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VNINDEX Candlestick (Plotly)</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    h2 { margin: 0 0 10px; }
    #chart { width: 100%; height: 860px; }
    .meta { font-size: 12px; color:#555; margin-top: 8px; }
    code { background:#f6f6f6; padding:2px 4px; border-radius:4px; }
  </style>
</head>
<body>
  <h2>VNINDEX Candlestick + Volume (Plotly)</h2>
  <div id="chart"></div>
  <div class="meta" id="meta">Loading…</div>

  <!-- load your generated cache -->
  <script src="./vnindex_ohlc.js"></script>

  <script>
    // ===== helpers =====
    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const da = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${da}`;
    }

    function computeMissingBusinessDays(dateStrings) {
      const dates = dateStrings.map(s => new Date(s + "T00:00:00"));
      const min = new Date(Math.min(...dates));
      const max = new Date(Math.max(...dates));
      const have = new Set(dateStrings);
      const missing = [];
      const cur = new Date(min);
      while (cur <= max) {
        const day = cur.getDay(); // 0 Sun ... 6 Sat
        if (day !== 0 && day !== 6) {
          const key = fmtDate(cur);
          if (!have.has(key)) missing.push(key);
        }
        cur.setDate(cur.getDate() + 1);
      }
      return missing;
    }

    // ===== load data =====
    const root = window.VNSTOCK_DATA || window.DATA;
    if (!root || !root.data) {
      document.getElementById("meta").innerHTML =
        "Không thấy <code>window.VNSTOCK_DATA.data</code>. Kiểm tra đường dẫn vnindex_ohlc.js";
      throw new Error("Missing VNSTOCK_DATA");
    }

    const rows = root.data
      .filter(r => r && r.date)
      .map(r => ({
        date: String(r.date).slice(0,10),
        open: Number(r.open),
        high: Number(r.high),
        low:  Number(r.low),
        close:Number(r.close),
        volume: (r.volume === null || r.volume === undefined) ? null : Number(r.volume),
      }))
      .filter(d => Number.isFinite(d.open) && Number.isFinite(d.high) && Number.isFinite(d.low) && Number.isFinite(d.close))
      .sort((a,b) => a.date.localeCompare(b.date));

    if (!rows.length) {
      document.getElementById("meta").textContent = "No valid OHLC rows.";
      throw new Error("No valid rows");
    }

    const x = rows.map(d => d.date);
    const open = rows.map(d => d.open);
    const high = rows.map(d => d.high);
    const low  = rows.map(d => d.low);
    const close= rows.map(d => d.close);
    const vol  = rows.map(d => d.volume);

    const volColors = rows.map(d => (d.close >= d.open ? "#00a86b" : "#e53935"));
    const missingWeekdays = computeMissingBusinessDays(x);

    // ===== traces =====
    const candle = {
      type: "candlestick",
      x, open, high, low, close,
      increasing: { line: { color: "#00a86b" }, fillcolor: "#00a86b" },
      decreasing: { line: { color: "#e53935" }, fillcolor: "#e53935" },
      whiskerwidth: 0.25,
      yaxis: "y",
      name: "VNINDEX"
    };

    const volume = {
      type: "bar",
      x,
      y: vol,
      marker: { color: volColors },
      opacity: 0.55,
      yaxis: "y2",
      name: "Volume"
    };

    // ===== layout (1 x-axis, 2 y domains) =====
    const layout = {
      margin: { l: 60, r: 20, t: 30, b: 40 },
      showlegend: false,
      height: 860,

      xaxis: {
        type: "date",
        rangeslider: { visible: false },
        rangeselector: {
          buttons: [
            { count: 1, label: "1m", step: "month", stepmode: "backward" },
            { count: 3, label: "3m", step: "month", stepmode: "backward" },
            { count: 6, label: "6m", step: "month", stepmode: "backward" },
            { count: 1, label: "YTD", step: "year", stepmode: "todate" },
            { count: 1, label: "1y", step: "year", stepmode: "backward" },
            { step: "all", label: "All" }
          ]
        },
        rangebreaks: [
          { bounds: ["sat","mon"] },      // skip weekends
          { values: missingWeekdays }     // skip holidays/gaps
        ]
      },

      yaxis:  { domain: [0.28, 1.0], title: "Index",  gridcolor:"#f0f0f0" },
      yaxis2: { domain: [0.0, 0.22], title: "Volume", gridcolor:"#f0f0f0" }
    };

    Plotly.newPlot("chart", [candle, volume], layout, { responsive:true, displayModeBar:true });

    const meta = root.meta ? ` | meta.rows=${root.meta.rows}` : "";
    document.getElementById("meta").textContent =
      `Loaded ${rows.length} candles | Range: ${x[0]} → ${x[x.length-1]} | Missing weekdays skipped: ${missingWeekdays.length}${meta}`;
  </script>
</body>
</html>
