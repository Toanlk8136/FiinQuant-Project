<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VNINDEX Candlestick + Flags</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    .grid { display:grid; grid-template-columns: 1fr 360px; gap: 14px; align-items: start; }
    #chart { width: 100%; height: 860px; }
    .panel { border:1px solid #ddd; border-radius:10px; padding:12px; }
    .panel h3 { margin: 0 0 10px; font-size: 16px; }
    .kv { display:grid; grid-template-columns: 150px 1fr; gap: 6px 10px; font-size: 13px; }
    .k { color:#555; }
    .v { font-weight: 600; }
    .hint { font-size: 12px; color:#666; margin-top:10px; }
    code { background:#f6f6f6; padding:2px 4px; border-radius:4px; }
  </style>
</head>
<body>
  <h2>VNINDEX Candlestick + Flags</h2>

  <div class="grid">
    <div>
      <div id="chart"></div>
      <div class="hint">Hover/click vào nến để xem flags. Data join theo <code>date</code>.</div>
    </div>

    <div class="panel">
      <h3 id="panelTitle">Chọn 1 phiên</h3>
      <div class="kv" id="panelBody"></div>
    </div>
  </div>

  <!-- 1) Load OHLC then snapshot -->
  <script src="./vnindex_ohlc.js"></script>
  <script> window.__OHLC__ = window.VNSTOCK_DATA; </script>

  <!-- 2) Load TREE then snapshot -->
  <script src="./data_tree.js"></script>
  <script> window.__TREE__ = window.VNSTOCK_DATA; </script>

  <script>
    // ---------- helpers ----------
    function computeMissingBusinessDays(dateStrings) {
      const dates = dateStrings.map(s => new Date(s + "T00:00:00"));
      const min = new Date(Math.min(...dates));
      const max = new Date(Math.max(...dates));
      const have = new Set(dateStrings);

      const fmt = (d) => {
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const da = String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${da}`;
      };

      const missing = [];
      const cur = new Date(min);
      while (cur <= max) {
        const day = cur.getDay(); // 0 Sun ... 6 Sat
        if (day !== 0 && day !== 6) {
          const key = fmt(cur);
          if (!have.has(key)) missing.push(key);
        }
        cur.setDate(cur.getDate() + 1);
      }
      return missing;
    }

    function pick(obj, keys, fallback="") {
      for (const k of keys) {
        if (obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== "") return obj[k];
      }
      return fallback;
    }

    function renderPanel(date, flags) {
      document.getElementById("panelTitle").textContent = `Phiên: ${date}`;

      const fields = [
        ["action", "Action"],
        ["structure", "Structure"],
        ["heat", "Heat"],
        ["efficiency", "Efficiency"],
        ["flow_quality", "Flow quality"],
        ["deleveraging_flag", "Deleveraging"],
        ["systemic_delev_flag", "Systemic delev"],
        ["core_absorption_flag", "Core absorption"],
        ["engineering_flag", "Engineering"],
      ];

      const body = document.getElementById("panelBody");
      body.innerHTML = "";

      for (const [key, label] of fields) {
        const k = document.createElement("div"); k.className="k"; k.textContent = label;
        const v = document.createElement("div"); v.className="v"; v.textContent = (flags[key] ?? "");
        body.appendChild(k); body.appendChild(v);
      }
    }

    // ---------- load datasets ----------
    const ohlcRoot = window.__OHLC__;
    const treeRoot = window.__TREE__;

    if (!ohlcRoot?.data) throw new Error("Missing OHLC data.");
    if (!treeRoot?.data) throw new Error("Missing TREE data.");

    // OHLC
    const ohlc = ohlcRoot.data
      .filter(r => r && r.date)
      .map(r => ({
        date: String(r.date).slice(0,10),
        open: Number(r.open),
        high: Number(r.high),
        low:  Number(r.low),
        close:Number(r.close),
        volume: (r.volume==null ? null : Number(r.volume))
      }))
      .filter(d => Number.isFinite(d.open) && Number.isFinite(d.high) && Number.isFinite(d.low) && Number.isFinite(d.close))
      .sort((a,b) => a.date.localeCompare(b.date));

    // TREE -> map by date
    const flagByDate = new Map();
    for (const r of treeRoot.data) {
      if (!r || !r.date) continue;
      const dt = String(r.date).slice(0,10);

      // unify names (v2/v3)
      const flags = {
        action: pick(r, ["action"], ""),
        structure: pick(r, ["structure", "structure_v3"], ""),
        heat: pick(r, ["heat", "heat_v3", "HEAT_TAG"], ""),
        efficiency: pick(r, ["efficiency", "efficiency_v3", "EFF_TAG"], ""),
        flow_quality: pick(r, ["flow_quality", "flow_quality_v3"], ""),
        deleveraging_flag: Number(pick(r, ["deleveraging_flag", "deleveraging_flag_v3"], 0)),
        systemic_delev_flag: Number(pick(r, ["systemic_delev_flag"], 0)),
        core_absorption_flag: Number(pick(r, ["core_absorption_flag", "core_absorption_flag_v3"], 0)),
        engineering_flag: Number(pick(r, ["engineering_flag", "engineering_flag_v3"], 0)),
      };
      flagByDate.set(dt, flags);
    }

    // Build arrays for Plotly + hovertext
    const x = ohlc.map(d => d.date);
    const open = ohlc.map(d => d.open);
    const high = ohlc.map(d => d.high);
    const low  = ohlc.map(d => d.low);
    const close= ohlc.map(d => d.close);
    const vol  = ohlc.map(d => d.volume);

    const missingWeekdays = computeMissingBusinessDays(x);

    // customdata per candle: embed flags
    const customdata = ohlc.map(d => {
      const f = flagByDate.get(d.date) || {};
      return [
        f.action ?? "",
        f.structure ?? "",
        f.heat ?? "",
        f.efficiency ?? "",
        f.flow_quality ?? "",
        f.deleveraging_flag ?? 0,
        f.systemic_delev_flag ?? 0,
        f.core_absorption_flag ?? 0,
        f.engineering_flag ?? 0,
      ];
    });

    const candle = {
      type: "candlestick",
      x, open, high, low, close,
      increasing: { line: { color: "#00a86b" }, fillcolor: "#00a86b" },
      decreasing: { line: { color: "#e53935" }, fillcolor: "#e53935" },
      whiskerwidth: 0.25,
      yaxis: "y",
      name: "VNINDEX",

      customdata,

      // Hover tooltip: show flags
      hovertemplate:
        "<b>%{x}</b><br>" +
        "O: %{open:.2f} H: %{high:.2f} L: %{low:.2f} C: %{close:.2f}<br><br>" +
        "<b>Flags</b><br>" +
        "action: %{customdata[0]}<br>" +
        "structure: %{customdata[1]}<br>" +
        "heat: %{customdata[2]}<br>" +
        "efficiency: %{customdata[3]}<br>" +
        "flow_quality: %{customdata[4]}<br>" +
        "deleveraging: %{customdata[5]}<br>" +
        "systemic_delev: %{customdata[6]}<br>" +
        "core_absorption: %{customdata[7]}<br>" +
        "engineering: %{customdata[8]}<br>" +
        "<extra></extra>"
    };

    const volColors = ohlc.map(d => (d.close >= d.open ? "#00a86b" : "#e53935"));
    const volume = {
      type: "bar",
      x,
      y: vol,
      marker: { color: volColors },
      opacity: 0.55,
      yaxis: "y2",
      name: "Volume",
      hovertemplate: "<b>%{x}</b><br>Volume: %{y}<extra></extra>"
    };

    const layout = {
      margin: { l: 60, r: 20, t: 30, b: 40 },
      showlegend: false,
      height: 900,
      xaxis: {
        type: "date",
        rangeslider: { visible: false },
        rangeselector: {
          buttons: [
            { count: 1, label: "1m", step: "month", stepmode: "backward" },
            { count: 3, label: "3m", step: "month", stepmode: "backward" },
            { count: 6, label: "6m", step: "month", stepmode: "backward" },
            { count: 1, label: "YTD", step: "year", stepmode: "todate" },
            { count: 1, label: "1y", step: "year", stepmode: "backward" },
            { step: "all", label: "All" }
          ]
        },
        rangebreaks: [
          { bounds: ["sat","mon"] },
          { values: missingWeekdays }
        ]
      },
      yaxis:  { domain: [0.28, 1.0], title: "Index",  gridcolor:"#f0f0f0" },
      yaxis2: { domain: [0.0, 0.22], title: "Volume", gridcolor:"#f0f0f0" }
    };

    Plotly.newPlot("chart", [candle, volume], layout, { responsive:true, displayModeBar:true });

    // ---------- Hook hover + click to update side panel ----------
    const chartDiv = document.getElementById("chart");

    function updateFromEvent(ev) {
      if (!ev || !ev.points || !ev.points.length) return;
      const p = ev.points[0];

      // Plotly candlestick provides x + customdata
      const date = String(p.x).slice(0,10);
      const cd = p.customdata || [];
      const flags = {
        action: cd[0] ?? "",
        structure: cd[1] ?? "",
        heat: cd[2] ?? "",
        efficiency: cd[3] ?? "",
        flow_quality: cd[4] ?? "",
        deleveraging_flag: cd[5] ?? 0,
        systemic_delev_flag: cd[6] ?? 0,
        core_absorption_flag: cd[7] ?? 0,
        engineering_flag: cd[8] ?? 0,
      };
      renderPanel(date, flags);
    }

    chartDiv.on('plotly_hover', updateFromEvent);
    chartDiv.on('plotly_click', updateFromEvent);

    // Default show latest date
    const last = ohlc[ohlc.length - 1].date;
    const lastFlags = flagByDate.get(last) || {};
    renderPanel(last, lastFlags);
  </script>
</body>
</html>
